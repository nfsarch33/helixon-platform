version: 2

builds:
  - id: helixon
    main: ./cmd/helixon
    binary: helixon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - image_templates:
      - "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/nfsarch33/helixon-platform"
  - image_templates:
      - "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/nfsarch33/helixon-platform"

docker_manifests:
  - name_template: "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}"
    image_templates:
      - "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}-amd64"
      - "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}-arm64"
  - name_template: "ghcr.io/nfsarch33/helixon-platform:latest"
    image_templates:
      - "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}-amd64"
      - "ghcr.io/nfsarch33/helixon-platform:{{ .Version }}-arm64"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

release:
  github:
    owner: nfsarch33
    name: helixon-platform
  draft: false
  prerelease: auto
