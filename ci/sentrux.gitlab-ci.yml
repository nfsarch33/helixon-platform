# runx-public-repo-gate: allow-file fleet_host_alias,network_topology
# GitLab CI pipeline for the Helixon fleet sentrux audit.
# Triggered on:
#   - Push to main / feature/* branches
#   - Nightly schedule (00:00 UTC = 10:00 AEST)
#   - Manual trigger via the GitLab UI
#
# Stages:
#   1. lint       — golangci-lint, govulncheck, semgrep, hadolint
#   2. test       — go test, go test -race, go test -integration
#   3. scan       — trivy fs scan, nancy, gitleaks
#   4. sentrux    — full sentrux audit (sentrux-skip-for-kb-repos excepted)
#   5. publish    — build, sign, push to internal registry
#
# Variables are passed via GitLab CI/CD settings (masked + protected).

variables:
  GO_VERSION: "1.23.4"
  REGISTRY: "ghcr.io/nfsarch33"
  IMAGE_NAME: "helixon-platform"
  SENTRUX_CONFIG: "sentrux/config.yaml"

stages:
  - lint
  - test
  - scan
  - sentrux
  - publish

# -------- Stage 1: lint --------
.golang:lint:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git bash
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - golangci-lint run --timeout=5m ./...
    - govulncheck ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH
  cache:
    key: golangci-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/golangci-lint

semgrep:
  stage: lint
  image: returntocorp/semgrep:latest
  script:
    - semgrep ci --config p/security-audit --config p/owasp-top-ten --error
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# -------- Stage 2: test --------
.test:base:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - go mod download
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/go-mod

go:test:
  extends: .test:base
  script:
    - go test -race -timeout=10m ./...

go:test:integration:
  extends: .test:base
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - go mod download
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - go test -tags=integration -timeout=20m ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG

# -------- Stage 3: scan --------
trivy:fs:
  stage: scan
  image: aquasec/trivy:latest
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL --no-progress .
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"

nancy:
  stage: scan
  image: sonatypecommunity/nancy:latest
  script:
    - go list -json -deps ./... | nancy sleuth
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

gitleaks:
  stage: scan
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --redact --report-path gitleaks.json
    - test -s gitleaks.json && exit 1 || exit 0
  artifacts:
    when: always
    paths:
      - gitleaks.json
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH

# -------- Stage 4: sentrux --------
sentrux:audit:
  stage: sentrux
  image: ghcr.io/nfsarch33/helixon-sentrux:latest
  before_script:
    - test -n "${SENTRUX_TOKEN:?SENTRUX_TOKEN must be set in CI/CD variables}"
  script:
    - sentrux audit --config ${SENTRUX_CONFIG} --branch ${CI_COMMIT_REF_NAME} --sha ${CI_COMMIT_SHA} --json > sentrux-report.json
    - jq '.summary' sentrux-report.json
    - test "$(jq -r '.verdict' sentrux-report.json)" = "PASS" || (echo "Sentrux FAILED"; exit 1)
  artifacts:
    when: always
    paths:
      - sentrux-report.json
    reports:
      junit: sentrux-junit.xml
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# -------- Stage 5: publish --------
publish:image:
  stage: publish
  image: docker:24
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} -t ${REGISTRY}/${IMAGE_NAME}:latest .
    - docker push ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker push ${REGISTRY}/${IMAGE_NAME}:latest
  rules:
    - if: $CI_COMMIT_TAG

publish:argocd:
  stage: publish
  image: bitnami/kubectl:latest
  script:
    - kubectl config set-cluster k3s --server=https://100.84.108.92:6443 --certificate-authority=${K3S_CA}
    - kubectl config set-credentials gitlab --token=${K3S_TOKEN}
    - kubectl config set-context default --cluster=k3s --user=gitlab --namespace=argocd
    - kubectl config use-context default
    - kubectl apply -f k8s/argocd/apps.yaml
  rules:
    - if: $CI_COMMIT_TAG
