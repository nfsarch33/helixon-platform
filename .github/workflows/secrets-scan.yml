name: Secrets scan

# CI parity for the Gitleaks + TruffleHog pre-push hook (v18725, mirrored in v18734-3).
# Runs on every PR + push to default branches; fails the build on any
# finding. Fork PRs (which bypass the local hook) are caught here.

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (full-history)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download gitleaks v8.30.1
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_amd64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan
        run: |
          gitleaks detect --no-banner --redact \
            --config .gitleaks.toml \
            --source . \
            --gitleaks-ignore-path .gitleaksignore \
            --exit-code 1 \
            --report-format sarif \
            --report-path /tmp/gitleaks.sarif || EXIT=$?
          if [ -n "$EXIT" ]; then exit $EXIT; fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/gitleaks.sarif
          category: gitleaks

  trufflehog:
    name: TruffleHog (live verification)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan (live verified only)
        run: |
          trufflehog git file://. --since-commit HEAD --only-verified --fail \
            --json 2>/tmp/trufflehog.json || EXIT=$?
          if [ -n "$EXIT" ]; then
            echo "TruffleHog found LIVE credentials. See artifact."
            exit $EXIT
          fi

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-findings
          path: /tmp/trufflehog.json
          if-no-files-found: ignore