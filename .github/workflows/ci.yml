name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -cover -coverprofile=coverage.txt ./...
      - name: Coverage check
        run: |
          total=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=70
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
