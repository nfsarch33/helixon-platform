version: "2"
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked errors
    - govet          # standard go vet
    - ineffassign    # unused assignments
    - staticcheck    # advanced checks (includes gosimple + stylecheck in v2)
    - unused         # unused identifiers
    - misspell       # common misspellings
    - bodyclose      # http body close
    - nilerr         # returning nil after error
    - contextcheck   # context propagation
    - durationcheck  # time.Duration multiplication
    - errorlint      # error wrapping
    - exhaustive     # enum exhaustiveness
    - gocritic       # opinionated checks
    - gosec          # security
    - prealloc       # pre-allocation
    - revive         # golint replacement
    - tparallel      # parallel t.Run
    - unconvert      # unnecessary conversions
    - unparam        # unused parameters
    - whitespace     # whitespace
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G115  # bounded by upstream length check (helixon-eval/tasks.go:93)
        - G404  # weak rand OK in chaos test fixtures (bifrost_test.go:96)
    revive:
      severity: warning
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-tags:
        - experimental
    staticcheck:
      checks: ["all"]
    errorlint:
      asserts: false
      comparison: false
  exclusions:
    rules:
      - path: examples/
        linters:
          - gocritic
          - gosec

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  format: tab
  print-issued-lines: true
  print-linter-name: true
