run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked errors
    - gosimple       # simplifications
    - govet          # standard go vet
    - ineffassign    # unused assignments
    - staticcheck    # advanced checks
    - unused         # unused identifiers
    - gofmt          # formatting
    - goimports      # import grouping
    - misspell       # common misspellings
    - bodyclose      # http body close
    - nilerr         # returning nil after error
    - contextcheck   # context propagation
    - durationcheck  # time.Duration multiplication
    - errorlint      # error wrapping
    - exhaustive     # enum exhaustiveness
    - gocritic       # opinionated checks
    - gosec          # security
    - prealloc       # pre-allocation
    - revive         # golint replacement
    - stylecheck     # style
    - tparallel      # parallel t.Run
    - unconvert      # unnecessary conversions
    - unparam        # unused parameters
    - whitespace     # whitespace

linters-settings:
  gosec:
    severity: medium
    confidence: medium
  revive:
    severity: warning
  misspell:
    locale: US
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-tags:
      - experimental
  staticcheck:
    checks: ["all"]
  errorlint:
    asserts: false
    comparison: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: examples/
      linters:
        - gocritic
        - gosec
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  format: tab
  print-issued-lines: true
  print-linter-name: true