---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helixon-llama-cpp-wsl4
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: helixon
  source:
    repoURL: https://github.com/nfsarch33/helixon-platform.git
    targetRevision: main
    path: k8s/llm-fleet/llama-cpp-wsl4
  destination:
    server: https://kubernetes.default.svc
    namespace: llm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m