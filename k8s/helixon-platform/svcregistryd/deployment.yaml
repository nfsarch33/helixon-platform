---
apiVersion: v1
kind: Namespace
metadata:
  name: helixon
  labels:
    app.kubernetes.io/part-of: helixon-platform
    owner: argo-cd
    sprint: v14881
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: svcregistryd-config
  namespace: helixon
  labels:
    app: svcregistryd
    app.kubernetes.io/part-of: helixon-platform
    sprint: v14881
data:
  owner: argo-cd
  sprint: v14881
  addr: "127.0.0.1:7777"
---
apiVersion: v1
kind: Service
metadata:
  name: svcregistryd
  namespace: helixon
  labels:
    app: svcregistryd
    app.kubernetes.io/part-of: helixon-platform
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 7777
    targetPort: 7777
    protocol: TCP
  selector:
    app: svcregistryd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svcregistryd
  namespace: helixon
  labels:
    app: svcregistryd
    app.kubernetes.io/part-of: helixon-platform
    sprint: v14881
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svcregistryd
  template:
    metadata:
      labels:
        app: svcregistryd
        app.kubernetes.io/part-of: helixon-platform
    spec:
      containers:
      - name: svcregistryd
        image: ghcr.io/helixon/helixon-svcregistryd:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7777
          name: http
        livenessProbe:
          exec:
            command:
              - /svcregistryd
              - -healthcheck
              - -addr=127.0.0.1:7777
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - /svcregistryd
              - -healthcheck
              - -addr=127.0.0.1:7777
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
