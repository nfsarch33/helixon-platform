# GitLab CI for nfsarch33/helixon-platform
#
# Mirrors .github/workflows/ci.yml so that:
#   - Today (GitLab CE blocked): runners register when CE recovers;
#     this file serves as the canonical pipeline.
#   - Tomorrow (post-recovery): this becomes the primary pipeline,
#     GitHub Actions self-hosted runners become the fallback.

stages:
  - lint
  - test
  - scan
  - publish

variables:
  GO_VERSION: "1.23.4"
  REGISTRY: "ghcr.io/helixon"
  IMAGE_NAME: "helixon-svcregistryd"
  CACHE_DIR: "$CI_PROJECT_DIR/.cache"

default:
  tags:
    - helixon
    - self-hosted
  before_script:
    - go version
    - podman --version

# ─────────────────────────────────────────────────────────────
# Stage 1: lint
# ─────────────────────────────────────────────────────────────
golangci-lint:
  stage: lint
  image:
    name: docker.io/golangci/golangci-lint:v1.62.2
    entrypoint: [""]
  script:
    - golangci-lint run --timeout=5m ./cmd/...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

govulncheck:
  stage: lint
  image: golang:$GO_VERSION-alpine
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─────────────────────────────────────────────────────────────
# Stage 2: test
# ─────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  image: golang:$GO_VERSION
  script:
    - go test -race -cover -coverprofile=coverage.txt -count=1 ./...
    - go tool cover -func=coverage.txt | grep total
  coverage: '/^total:\s+\(statements\)?\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.txt
    expire_in: 30 days

# ─────────────────────────────────────────────────────────────
# Stage 3: scan
# ─────────────────────────────────────────────────────────────
trivy-fs:
  stage: scan
  image:
    name: docker.io/aquasec/trivy:0.58.1
    entrypoint: [""]
  script:
    - trivy fs --scanners vuln,secret,misconfig
        --exit-code 0 --severity HIGH,CRITICAL --no-progress .
  allow_failure: true

nancy-deps:
  stage: scan
  image: golang:$GO_VERSION
  script:
    - go install github.com/sonatype-nexus-community/nancy@latest
    - go list -json -deps ./... | nancy sleuth
  allow_failure: true

# ─────────────────────────────────────────────────────────────
# Stage 4: publish (build, sign, push)
# ─────────────────────────────────────────────────────────────
build-and-push-svcregistryd:
  stage: publish
  image:
    name: quay.io/podman/stable:v4.9.3
    entrypoint: [""]
  script:
    - podman build -t $REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        -f cmd/svcregistryd/Containerfile cmd/svcregistryd
    - podman tag  $REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        $REGISTRY/$IMAGE_NAME:dev
    # Push: ghcr.io OR localhost:5000 depending on REGISTRY_OVERRIDE
    - |
      if [ "$REGISTRY_OVERRIDE" = "localhost:5000" ]; then
        podman push --tls-verify=false $REGISTRY/$IMAGE_NAME:dev localhost:5000/$IMAGE_NAME:dev
      else
        echo "$GHCR_PASSWORD" | podman login ghcr.io -u "$GHCR_USER" --password-stdin
        podman push $REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
        podman push $REGISTRY/$IMAGE_NAME:dev
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
