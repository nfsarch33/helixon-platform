stages:
  - lint
  - test
  - build
  - security
  - sync
  - notify

variables:
  GOVERSION: "1.26"
  GOFLAGS: "-buildvcs=false"

.go_base:
  image: golang:${GOVERSION}
  before_script:
    - go mod download
  tags:
    - docker

vet:
  extends: .go_base
  stage: lint
  script:
    - go vet ./...

lint:
  extends: .go_base
  stage: lint
  script:
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run --timeout 5m ./...
  allow_failure: true

test:
  extends: .go_base
  stage: test
  script:
    - go test -race -count=1 -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
    expire_in: 7 days
  coverage: "/total:\\s+\\(statements\\)\\s+(\\d+\\.\\d+)%/"

build:
  extends: .go_base
  stage: build
  script:
    - CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=${CI_COMMIT_SHORT_SHA}" -o helixon ./cmd/helixon/
  artifacts:
    paths:
      - helixon
    expire_in: 7 days
  only:
    - main
    - tags

govulncheck:
  extends: .go_base
  stage: security
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...

gosec:
  extends: .go_base
  stage: security
  script:
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
    - gosec -quiet ./...
  allow_failure: true

github-sync:
  stage: sync
  tags:
    - docker
  image: golang:${GOVERSION}
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  script:
    - |
      if [ -z "${GITHUB_SYNC_TOKEN}" ] || [ -z "${GITHUB_REPO_URL}" ]; then
        echo "WARN: sync vars not set, skipping"; exit 0
      fi
    - |
      PUSH_URL="${GITHUB_REPO_URL}"
      if echo "${PUSH_URL}" | grep -q "^https://"; then
        PUSH_URL=$(echo "${PUSH_URL}" | sed "s|https://|https://x-access-token:${GITHUB_SYNC_TOKEN}@|")
      fi
    - git remote add github "${PUSH_URL}" 2>/dev/null || git remote set-url github "${PUSH_URL}"
    - git fetch origin --unshallow 2>/dev/null || true
    - git push github "HEAD:${CI_COMMIT_REF_NAME}" --force
    - echo "Synced ${CI_COMMIT_REF_NAME} to GitHub"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  after_script:
    - git remote remove github 2>/dev/null || true
  allow_failure: true

ci-failure-notify:
  stage: notify
  tags:
    - docker
  image: golang:${GOVERSION}
  when: on_failure
  allow_failure: true
  script:
    - |
      if [ -z "${NOTIFICATION_WEBHOOK_URL}" ]; then
        echo "WARN: NOTIFICATION_WEBHOOK_URL not set, skipping"; exit 0
      fi
    - |
      curl -sf -X POST "${NOTIFICATION_WEBHOOK_URL}" -H "Content-Type: application/json" \
        -d '{"title":"CI failure: '${CI_PROJECT_NAME}' #'${CI_PIPELINE_ID}' on '${CI_COMMIT_REF_NAME}'","status":"open","source":"gitlab-ci"}' \
        || echo "WARN: notification failed"
  rules:
    - when: on_failure
