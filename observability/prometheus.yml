# Prometheus scrape config for the Helixon fleet.
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: helixon-fleet
    region: sydney

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: alertmanager
    static_configs:
      - targets: ['127.0.0.1:9093']

  - job_name: svcregistryd
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:7777']

  - job_name: engramd
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8280']

  - job_name: sprintboard-api
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:9400']

  - job_name: llm-router
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8080']

  - job_name: helixon_fleet_node
    metrics_path: /metrics
    static_configs:
      - targets:
          - '100.84.108.92:9100'   # wsl1 (self)
          - '100.110.82.5:9100'    # wsl2
          - '100.79.227.40:9100'   # wsl4
          - '100.73.98.10:9100'    # wsl3
    relabel_configs:
      - source_labels: [__address__]
        regex: '100\.(.+?)\.(.+?)\.(.+?):.+'
        target_label: tailscale_ip
        replacement: '${1}.${2}.${3}'
      - source_labels: [__address__]
        regex: '100\.84\.108\.92:.+'
        target_label: alias
        replacement: wsl1
      - source_labels: [__address__]
        regex: '100\.110\.82\.5:.+'
        target_label: alias
        replacement: wsl2
      - source_labels: [__address__]
        regex: '100\.79\.227\.40:.+'
        target_label: alias
        replacement: wsl4
      - source_labels: [__address__]
        regex: '100\.73\.98\.10:.+'
        target_label: alias
        replacement: wsl3

  - job_name: prometheus-pushgateway
    honor_labels: true
    static_configs:
      - targets: ['127.0.0.1:9091']
