# alertmanager.yml — routes Helixon alerts by severity label.
route:
  receiver: default
  group_by: ["alertname", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="page"
      receiver: pagerduty
      group_wait: 10s
      repeat_interval: 1h
    - matchers:
        - severity="notify"
      receiver: slack-helixon-alerts
      group_wait: 30s
    - matchers:
        - severity="log"
      receiver: null
      group_wait: 5m
      repeat_interval: 168h

receivers:
  - name: default
    webhook_configs:
      - url: http://localhost:5001/helixon-alerts/default
        send_resolved: true
  - name: pagerduty
    pagerduty_configs:
      - service_key: ${PAGERDUTY_SERVICE_KEY}
        send_resolved: true
  - name: slack-helixon-alerts
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#helixon-alerts"
        send_resolved: true
        title: "{{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

inhibit_rules:
  # If the control plane is DOWN, suppress all dependent alerts.
  - source_matchers:
      - alertname="ControlPlaneDown"
    target_matchers:
      - team="helixon-platform"
  # If zero cells are ready, suppress individual cell alerts.
  - source_matchers:
      - alertname="Qwen36ZeroCellsReady"
    target_matchers:
      - component="qwen36"