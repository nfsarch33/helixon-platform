# grafana-provisioning/dashboards/dashboards.yml
apiVersion: 1
providers:
  - name: helixon
    orgId: 1
    folder: "Helixon"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true